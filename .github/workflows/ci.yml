name: CI Workflow

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-backend:
    name: Build Backend (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Implementations/Backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean verify

  build-frontend:
    name: Build Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Implementations/Frontend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: Implementations/Frontend/package-lock.json
        
    - name: Install dependencies
      run: npm install
      
    - name: Build
      run: npm run build
      
    - name: Run Tests
      # Add test script if applicable in your package.json
      run: npm test --if-present